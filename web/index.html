<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium IPTV</title>
  <meta name="description" content="Watch 12,000+ live TV channels instantly in your browser.">
  
  <!-- Modern Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f19">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
</head>
<body>
  
  <!-- Desktop Sidebar -->
  <aside id="desktop-sidebar" class="desktop-sidebar hidden-mobile">
    <div class="logo sidebar-logo">IPTV<span class="accent">.</span></div>
    <div class="sidebar-nav">
      <button class="side-nav-item active" id="side-nav-home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Home</span>
      </button>
      <button class="side-nav-item" id="side-nav-search">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <span>Search</span>
      </button>
      <button class="side-nav-item" id="side-nav-favorites">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        <span>Favorites</span>
      </button>
    </div>
  </aside>
  <header class="header">
    <div class="logo header-logo hidden-desktop">IPTV<span class="accent">.</span></div>
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search channels or categories..." autocomplete="off">
    </div>
  </header>

  <main id="main-content">
    <div id="home-view">
      <div id="loading" class="center-message">
        <div class="spinner"></div>
        <h2>Loading 12,000+ Channels...</h2>
      </div>
      <div id="error" class="center-message hidden">
        <h2 id="error-text">Failed to load channels.</h2>
      </div>
      
      <div id="categories-container">
        <!-- Categories will be injected here via JS -->
      </div>
    </div>

    <div id="favorites-view" class="hidden">
      <h2 class="category-title" style="margin-bottom: 1.5rem; padding-left: 0;">⭐ Your Favorites</h2>
      <div id="favorites-grid" class="channels-grid"></div>
    </div>
  </main>

  <!-- Video Modal -->
  <dialog id="video-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Channel Name</h3>
        <button id="close-modal" aria-label="Close video">&times;</button>
      </div>
      <div class="video-container">
        <div id="video-error" class="video-error hidden">Stream unavailable</div>
        <video id="video-player" controls playsinline></video>
      </div>
    </div>
  </dialog>

  <!-- Mobile Bottom Navigation -->
  <nav id="bottom-nav" class="bottom-nav hidden-desktop">
    <button class="nav-item active" id="nav-home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" id="nav-search">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <span>Search</span>
    </button>
    <button class="nav-item" id="nav-favorites">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
      <span>Favorites</span>
    </button>
  </nav>

  <script src="app.js" defer></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then((registration) => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, (err) => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
